# Scoop's Excavator runs the manifest's own checkver/autoupdate blocks and
# commits the resulting version bump. Without it, checkver/autoupdate are inert
# config — which is exactly why this bucket sat on 0.9.52 while PyPI shipped
# ~60 further releases (audit 2026-07-22).
name: Excavator

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  excavate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update manifests from upstream
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: "1"
